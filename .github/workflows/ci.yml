name: ChameleonLog CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev pkg-config

      - name: Install dependencies
        run: |
          uv sync --group lint --all-extras --no-install-project

      - name: Run Ruff check
        run: uv run ruff check

      - name: Run Ruff format check
        run: uv run ruff format --check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: |
          uv python install ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev pkg-config

      - name: Install dependencies
        run: |
          uv sync --group test --all-extras --no-install-project

      - name: Run tests
        run: uv run pytest

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev pkg-config

      - name: Install dependencies
        run: |
          uv sync --group docs --all-extras --no-install-project

      - name: Build documentation
        run: |
          uv run sphinx-build -W --keep-going -b html docs docs/_build/html
