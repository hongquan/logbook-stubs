name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --group lint
      - name: Run Ruff
        run: uv run ruff check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Install zuban
        run: uv tool install zuban
      - name: Run zuban
        run: uvx zuban check

  build-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --group docs
      - name: Build documentation
        run: .venv/bin/sphinx-build docs/source docs/build/html
